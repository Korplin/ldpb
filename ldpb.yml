---
# =============================================================================
# devplatform.yml
# Linux Developer Platform Bootstrap — Stage 3
#
# Repository : https://github.com/Korplin/ldpv
# Target OS  : Debian 13 "trixie" amd64
# Run with   : ansible-playbook /tmp/devplatform.yml
#              (invoked automatically by ldpb.sh)
#
# All tasks use ansible.builtin.* fully-qualified module names.
# The playbook is idempotent — every task is safe to run multiple times.
# Most binary downloads have no checksum verification - intentional at this stage, not considered issue.
#
# CHANGELOG (reviewed fixes):
#   [FIX-1] Added DEBIAN_FRONTEND=noninteractive play-wide to prevent interactive
#           prompts stalling the run during KDE, SDDM, and debconf installs.
#   [FIX-2] Added dkms + linux-headers-amd64 prerequisites BEFORE nvidia driver
#           install. Missing these was the direct cause of the boot failure:
#           DKMS could not build the kernel module → systemd-modules-load.service
#           failed → nvidia-persistenced failed → no GPU driver loaded.
#   [FIX-3] Changed nvidia_driver_pkg default from 'nvidia-driver' to '' with an
#           explicit fail task. For GTX 560 Ti (Fermi), nvidia-detect returns
#           nvidia-legacy-390xx-driver. If detection fails and we silently fall
#           back to nvidia-driver (which does not support Fermi), the module
#           cannot drive the hardware and DKMS wastes time building the wrong thing.
#   [FIX-4] Added dkms autoinstall call after driver install to force an
#           immediate module build (instead of waiting for the next apt trigger).
#   [FIX-5] Added modinfo check to verify the module was actually built.
#   [FIX-6] Added automatic removal of the nouveau blacklist if the NVIDIA module
#           is absent. Without this, a failed proprietary install leaves nouveau
#           blacklisted with no replacement → black screen on reboot.
#   [FIX-7] Added update-initramfs -u -k all after all driver/module changes.
#           Without this, the initrd does not include the new module or the
#           blacklist changes, so they have no effect on the next boot.
# =============================================================================
- name: Linux Developer Platform Bootstrap
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  # [FIX-1] DEBIAN_FRONTEND prevents all apt/dpkg interactive prompts.
  # Without this, installs like kde-standard and sddm can stall waiting for
  # keyboard/timezone input during a non-interactive ansible run.
  environment:
    DEBIAN_FRONTEND: noninteractive

  vars:
    # ── Real (non-root) user detection ──────────────────────────────────────
    # When the bootstrap script runs via sudo, SUDO_USER is set to the
    # original caller's username. real_home is resolved authoritatively
    # from /etc/passwd in pre_tasks below — not hardcoded here.
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

    # ── Pinned versions — bump here to update ───────────────────────────────
    nvm_version:  "v0.40.1"   # https://github.com/nvm-sh/nvm/releases
    helm_version: "v4.1.4"    # https://github.com/helm/helm/releases
    #  Helm patch release v4.1.4 is released April 8, 2026. Helm 4 is intentional choice.
    helm_arch:    "amd64"

    # ── Cursor IDE metadata API ──────────────────────────────────────────────
    # Returns JSON with debUrl, version, etc. Actual .deb URL is extracted
    # from the response in the Cursor section below.
    cursor_api_url: "https://cursor.com/api/download?platform=linux-x64&releaseTrack=stable"

  # ============================================================================
  # PRE-TASKS: sanity checks + variable resolution before the main task list
  # ============================================================================
  pre_tasks:

    - name: "[PRE] Assert target is Debian 13 trixie"
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_distribution_release == "trixie"
        fail_msg: >
          This playbook requires Debian 13 (trixie).
          Detected: {{ ansible_distribution }} {{ ansible_distribution_release }}.
        success_msg: "Confirmed: Debian 13 (trixie)"
      # Reason: Hard-fail immediately if the OS is wrong rather than silently
      # applying trixie-specific APT sources to an incompatible system.

    - name: "[PRE] Resolve real_home from the passwd database"
      ansible.builtin.command:
        cmd: "getent passwd {{ real_user }}"
      register: _passwd_entry
      changed_when: false
      failed_when: _passwd_entry.rc != 0
      # Reason: getent reads /etc/passwd authoritatively and handles any home
      # directory location — /home/x, /root, /data/users/x, etc. Hardcoding
      # "/home/{{ real_user }}" breaks for root and any custom home path.

    - name: "[PRE] Set real_home fact from passwd entry"
      ansible.builtin.set_fact:
        real_home: "{{ _passwd_entry.stdout.split(':')[5] }}"
      # Reason: The 6th colon-delimited field (index 5) of /etc/passwd is the
      # home directory — authoritative and platform-independent.

    - name: "[PRE] Display configuration summary"
      ansible.builtin.debug:
        msg:
          - "real_user : {{ real_user }}"
          - "real_home : {{ real_home }}"

  handlers:
    - name: Restart ssh
      ansible.builtin.systemd:
        name: ssh
        state: restarted

  # ============================================================================
  tasks:

    # ==========================================================================
    # ENTROPY — install before SSH so haveged starts before sshd at every boot
    # ==========================================================================

    - name: "[ENTROPY] Install haveged entropy daemon"
      ansible.builtin.apt:
        name: haveged
        state: present
      # Reason: bare metal systems have an empty entropy pool at boot.
      # sshd blocks generating host keys until /dev/random has sufficient
      # entropy. haveged starts before sshd in the boot order and fills the
      # pool. VirtualBox is unaffected (virtio-rng seeds entropy instantly).

    - name: "[ENTROPY] Enable haveged at boot"
      ansible.builtin.systemd:
        name: haveged
        enabled: true
        state: started

    - name: "[ENTROPY] Pre-generate SSH host keys during Ansible run"
      ansible.builtin.command:
        cmd: ssh-keygen -A
        creates: /etc/ssh/ssh_host_ed25519_key
      # Reason: ssh-keygen -A generates all missing key types. If keys already
      # exist when sshd starts at boot, it skips generation and starts
      # immediately with no entropy dependency.

    # ==========================================================================
    # SSH HARDENING AND RESTART
    # ==========================================================================

    - name: "[SSH] Ensure OpenSSH server and config directory exist"
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true

    - name: "[SSH] Ensure sshd config drop-in directory exists"
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[SSH] Write sshd hardening config"
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/devplatform.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          PermitRootLogin no
          PasswordAuthentication no
          X11Forwarding no
      notify: Restart ssh

    - name: "[SSH] Ensure .ssh directory exists for {{ real_user }}"
      ansible.builtin.file:
        path: "{{ real_home }}/.ssh"
        state: directory
        owner: "{{ real_user }}"
        group: "{{ real_user }}"
        mode: "0700"

    - name: "[SSH] Ensure authorized_keys file exists for {{ real_user }}"
      ansible.builtin.file:
        path: "{{ real_home }}/.ssh/authorized_keys"
        state: touch
        owner: "{{ real_user }}"
        group: "{{ real_user }}"
        mode: "0600"
        modification_time: preserve
        access_time: preserve
      # ACTION REQUIRED: populate this file with your public key before use.
      # PasswordAuthentication is disabled — SSH is inaccessible without it.
      # Replace this task with ansible.builtin.copy or ansible.builtin.lineinfile
      # to deploy your actual public key.


    # ==========================================================================
    # APT SOURCES
    # ==========================================================================



    - name: "[APT] Write /etc/apt/sources.list"
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
        content: |
          # Debian 13 (trixie) — managed by Ansible (devplatform.yml)
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb-src http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
          deb-src http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          deb-src http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
      # Reason: Since Debian 12, non-free-firmware is a separate component.
      # Both non-free AND non-free-firmware must be listed to get proprietary
      # GPU drivers (non-free) AND hardware firmware blobs like WiFi and CPU
      # microcode (non-free-firmware). contrib contains packages that depend
      # on non-free software.

    - name: "[APT] Create /etc/apt/keyrings directory"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"
      # Reason: /etc/apt/keyrings is the Debian 12+ standard location for
      # per-repository GPG keys used with the signed-by= apt option.

    - name: "[APT] Refresh package cache after sources.list update"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      # Reason: cache_valid_time: 0 forces a full refresh immediately after
      # writing sources.list so subsequent tasks see the new components.

    - name: "[FINAL] Full system upgrade"
      ansible.builtin.apt:
        upgrade: full
        update_cache: true
      # Reason: Pulls in security updates published after the netinst ISO.

    - name: "[FINAL] Remove orphaned packages"
      ansible.builtin.apt:
        autoremove: true
        purge: true

    - name: "[FINAL] Clean apt package cache"
      ansible.builtin.apt:
        autoclean: true

    # ==========================================================================
    # ENVIRONMENT DETECTION
    # gather_facts gives us OS, CPU, and memory.
    # GPU and virtualisation type require querying hardware directly.
    # ==========================================================================

    - name: "[PRE] Install hardware detection prerequisites"
      ansible.builtin.apt:
        name:
          - pciutils
        state: present
        update_cache: true

    - name: "[detect] Query PCI devices"
      ansible.builtin.command:
        cmd: lspci -nn
      register: lspci_output
      changed_when: false

    - name: "[detect] Detect virtualisation platform"
      ansible.builtin.command:
        cmd: systemd-detect-virt
      register: virt_detect
      changed_when: false
      failed_when: false
      # systemd-detect-virt returns: oracle (VirtualBox), kvm, vmware, none, etc.
      # Exit code 1 on bare metal — expected behaviour, not an error.

    - name: "[detect] Set environment facts"
      ansible.builtin.set_fact:
        is_virtualbox: "{{ virt_detect.stdout == 'oracle' }}"
        is_kvm_guest:  "{{ virt_detect.stdout in ['kvm', 'qemu'] }}"
        is_vmware:     "{{ virt_detect.stdout == 'vmware' }}"
        is_bare_metal: "{{ virt_detect.stdout == 'none' }}"
        has_nvidia:    "{{ 'NVIDIA' in lspci_output.stdout | upper }}"
        has_amd:       "{{ ('AMD' in lspci_output.stdout | upper) or ('ATI' in lspci_output.stdout | upper) }}"
        has_intel_gpu: "{{ ('INTEL' in lspci_output.stdout | upper) and (('VGA' in lspci_output.stdout | upper) or ('DISPLAY' in lspci_output.stdout | upper)) }}"

    - name: "[detect] Show detected environment"
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  Environment : {{ virt_detect.stdout | default('bare metal') }}"
          - "  Bare metal  : {{ is_bare_metal }}"
          - "  VirtualBox  : {{ is_virtualbox }}"
          - "  KVM/QEMU    : {{ is_kvm_guest }}"
          - "  NVIDIA GPU  : {{ has_nvidia }}"
          - "  AMD GPU     : {{ has_amd }}"
          - "  Intel GPU   : {{ has_intel_gpu }}"
          - "  Dev user    : {{ real_user }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    # ==========================================================================
    # GPU DRIVERS AND VM GUEST TOOLS
    # Branches based on detected environment.
    # Each branch is mutually exclusive — only one will execute per run.
    # ==========================================================================

    # ── Branch A: VirtualBox guest ────────────────────────────────────────────
    #
    # Guest Additions are installed from the VirtualBox ISO — NOT from apt.
    # Reason: the apt packages (virtualbox-guest-*) were removed from Debian 13.
    # The ISO method also guarantees the version matches your VirtualBox host.
    #
    # STUDENT ACTION — do this BEFORE running bootstrap.sh:
    #   VirtualBox menu → Devices → Insert Guest Additions CD Image
    #
    # If the ISO is inserted, this section mounts it and installs automatically.
    # If it is missing, a clear warning prints and the run continues without it.
    # Re-running bootstrap.sh after inserting the ISO will complete this step.

    - name: "[gpu/vm] Check if Guest Additions are already installed"
      ansible.builtin.stat:
        path: /sbin/rcvboxadd
      register: vbox_ga_installed
      when: is_virtualbox

    - name: "[gpu/vm] Check if Guest Additions ISO is present at /dev/cdrom"
      ansible.builtin.stat:
        path: /dev/cdrom
      register: cdrom_stat
      when:
        - is_virtualbox
        - not (vbox_ga_installed.stat | default({})).get('exists', false)

    - name: "[gpu/vm] Warn if Guest Additions ISO is not inserted"
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "  ⚠  Guest Additions ISO not found at /dev/cdrom"
          - "     Clipboard sharing and auto-resize will NOT work."
          - ""
          - "  Fix: VirtualBox menu → Devices → Insert Guest Additions CD"
          - "       Then re-run bootstrap.sh — this step will complete."
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - not cdrom_stat.stat.exists

    - name: "[gpu/vm] Create mount point for Guest Additions ISO"
      ansible.builtin.file:
        path: /mnt/vbox-ga
        state: directory
        mode: '0755'
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - cdrom_stat.stat.exists

    - name: "[gpu/vm] Mount Guest Additions ISO"
      ansible.builtin.mount:
        path: /mnt/vbox-ga
        src: /dev/cdrom
        fstype: iso9660
        opts: ro
        state: mounted
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - cdrom_stat.stat.exists

    - name: "[gpu/vm] Install VirtualBox Guest Additions prerequisites"
      ansible.builtin.apt:
        name:
          - build-essential
          - dkms
          - linux-headers-amd64
          - bzip2
          - perl
        state: present
        update_cache: true
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - cdrom_stat.stat.exists

    - name: "[gpu/vm] Install VirtualBox Guest Additions from ISO"
      ansible.builtin.shell:
        cmd: /mnt/vbox-ga/VBoxLinuxAdditions.run --nox11
      register: vbox_ga_result
      failed_when: vbox_ga_result.rc not in [0, 1, 2]
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - cdrom_stat.stat.exists
      # --nox11: skip X11 guest components.
      # KDE Plasma 6 on Debian 13 runs on Wayland — X11 drivers are irrelevant.
      # Without --nox11 the installer tries to install X11 components, fails
      # on parts it cannot find, and exits with code 1 even on success.
      # Exit 0 = full success. Exit 1, 2 = partial success (expected). Exit 3+ = real failure.

    - name: "[gpu/vm] Show Guest Additions installer output"
      ansible.builtin.debug:
        msg: "{{ vbox_ga_result.stdout_lines | default([]) }}"
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - vbox_ga_result is defined

    - name: "[gpu/vm] Unmount Guest Additions ISO"
      ansible.builtin.mount:
        path: /mnt/vbox-ga
        state: unmounted
      when:
        - is_virtualbox
        - not vbox_ga_installed.stat.exists
        - cdrom_stat.stat.exists

    - name: "[gpu/vm] Guest Additions already installed — skipping"
      ansible.builtin.debug:
        msg: "VirtualBox Guest Additions already installed. Nothing to do."
      when:
        - is_virtualbox
        - vbox_ga_installed.stat.exists

    # ── Branch B: KVM/QEMU guest ──────────────────────────────────────────────
    - name: "[gpu/vm] Install KVM/QEMU guest tools"
      ansible.builtin.apt:
        name:
          - spice-vdagent       # clipboard sharing, auto-resolution with SPICE
          - qemu-guest-agent    # host-to-guest communication channel
          # NOTE: xserver-xorg-video-qxl was removed from Debian 13.
          # Wayland handles KVM display integration without X11 video drivers.
        state: present
      when: is_kvm_guest

    # ── Branch C: NVIDIA on bare metal ───────────────────────────────────────
    #
    # nvidia-legacy-390xx-driver was DROPPED from Debian 13 Trixie.
    # The package does not exist in Trixie's repos. We work around this with a
    # four-phase shell script that is self-contained and always leaves the system
    # in a bootable, display-capable state regardless of outcome.
    #
    # PHASE 0  Clean  — purge any broken NVIDIA state from previous runs so we
    #                   start fresh every time the playbook runs
    # PHASE 1  Modern — if nvidia-detect recommends a package that IS in Trixie
    #                   (nvidia-driver for recent GPUs), install that and finish
    # PHASE 2  Bookworm — add Debian 12 non-free repo with APT pinning and pull
    #                   nvidia-legacy-390xx-driver from there; safe because the
    #                   Pin-Priority keeps ALL other Bookworm packages below
    #                   Trixie's priority so nothing else gets downgraded
    # PHASE 3  Patch  — the Bookworm 390.157 DKMS source was built for kernel
    #                   6.1; on Trixie's 6.12 it fails with a handful of
    #                   compile errors. We apply targeted sed/patch fixes for
    #                   the known breakage points and rebuild
    # PHASE 4  Nouveau — if all proprietary attempts fail the Bookworm repo is
    #                   removed, any nouveau blacklists are deleted, and nouveau
    #                   is explicitly configured with modeset=1. The GTX 560 Ti
    #                   is fully supported by nouveau for 2D/3D desktop use; the
    #                   "ce channel -22" boot message is about a compute engine
    #                   that KDE Plasma never uses — it does NOT affect display
    # ALWAYS   initramfs — rebuilt unconditionally at the end of the script so
    #                   blacklist/module changes take effect on the next boot

    - name: "[gpu/nvidia] Install build prerequisites"
      ansible.builtin.apt:
        name:
          - dkms
          - linux-headers-amd64
          - build-essential
          - pciutils
          - curl
        state: present
        update_cache: false
      when: has_nvidia and is_bare_metal

    - name: "[gpu/nvidia] Run driver install script (Bookworm → patch → nouveau)"
      ansible.builtin.shell:
        cmd: |
          #!/bin/bash
          # ── strict mode, but we handle failures ourselves ──────────────────
          set -uo pipefail

          RESULT="unknown"
          KERNEL="$(uname -r)"

          log() { echo ">>> [gpu/nvidia] $*"; }
          ok()  { echo "    ✔  $*"; }
          warn(){ echo "    ⚠  $*"; }

          # ══════════════════════════════════════════════════════════════════
          # PHASE 0 — clean any broken NVIDIA state from previous runs
          # ══════════════════════════════════════════════════════════════════
          log "Phase 0: cleaning previous NVIDIA state"
          DEBIAN_FRONTEND=noninteractive apt-get purge -y \
            'nvidia-*' 'libcuda*' 'libgl1-nvidia*' 2>/dev/null || true
          # Remove ALL modprobe.d files that could blacklist nouveau or load
          # an absent nvidia module.  We re-create the right ones later.
          rm -f /etc/modprobe.d/nvidia*.conf
          rm -f /etc/modprobe.d/blacklist-nouveau.conf
          # Clean up any leftover bookworm repo from a failed previous run
          rm -f /etc/apt/sources.list.d/bookworm-nvidia.list
          rm -f /etc/apt/preferences.d/bookworm-nvidia-pin
          apt-get update -qq 2>/dev/null

          # ══════════════════════════════════════════════════════════════════
          # PHASE 1 — check if a Trixie-native driver covers this GPU
          # nvidia-detect is in Trixie and its PCI ID database is current.
          # For Fermi (GTX 560 Ti) it will recommend nvidia-legacy-390xx-driver
          # which is absent; for modern GPUs it recommends nvidia-driver which
          # IS in Trixie — handle that case here so the script works for all cards
          # ══════════════════════════════════════════════════════════════════
          log "Phase 1: checking for Trixie-native driver"
          DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-detect 2>/dev/null || true

          DETECTED_PKG=""
          if command -v nvidia-detect >/dev/null 2>&1; then
            DETECTED_PKG=$(nvidia-detect 2>/dev/null \
              | grep -E '^\s+nvidia' | awk '{print $1}' | head -1 || true)
            log "nvidia-detect recommends: '${DETECTED_PKG:-none}'"
          fi

          if [ -n "$DETECTED_PKG" ] && [ "$DETECTED_PKG" != "nvidia-legacy-390xx-driver" ]; then
            # Modern card — package exists in Trixie
            log "Installing Trixie-native driver: $DETECTED_PKG"
            if DEBIAN_FRONTEND=noninteractive apt-get install -y "$DETECTED_PKG" 2>&1; then
              dkms autoinstall 2>&1 || true
              if modinfo nvidia >/dev/null 2>&1; then
                ok "Trixie-native NVIDIA module present"
                RESULT="nvidia-trixie"
              fi
            fi
          fi

          # ══════════════════════════════════════════════════════════════════
          # PHASE 2 — install nvidia-legacy-390xx-driver from Debian 12 Bookworm
          # We pin ALL Bookworm packages to priority 100 (below Trixie's 500)
          # so apt will never prefer a Bookworm version of anything except the
          # nvidia packages we explicitly name at priority 700.
          # ══════════════════════════════════════════════════════════════════
          if [ "$RESULT" = "unknown" ]; then
            log "Phase 2: adding Debian 12 Bookworm repo (pinned)"

            cat > /etc/apt/sources.list.d/bookworm-nvidia.list << 'APTEOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          APTEOF

            # Priority rules:
            #   All Bookworm packages          → 100  (never auto-selected)
            #   The nvidia legacy packages      → 700  (preferred over Trixie's absent ones)
            cat > /etc/apt/preferences.d/bookworm-nvidia-pin << 'PINEOF'
          Package: *
          Pin: release n=bookworm
          Pin-Priority: 100

          Package: nvidia-legacy-390xx-driver nvidia-legacy-390xx-kernel-dkms nvidia-legacy-390xx-kernel-source nvidia-support nvidia-detect firmware-misc-nonfree
          Pin: release n=bookworm
          Pin-Priority: 700
          PINEOF

            apt-get update -qq 2>/dev/null

            log "Installing nvidia-legacy-390xx-driver from Bookworm"
            if DEBIAN_FRONTEND=noninteractive apt-get install -y \
                -o "APT::Get::AllowChangeHeldPackages=true" \
                nvidia-legacy-390xx-driver 2>&1; then
              ok "Package installed — triggering DKMS build"
              dkms autoinstall 2>&1 || true

              if modinfo nvidia >/dev/null 2>&1; then
                ok "Bookworm NVIDIA module built successfully"
                RESULT="nvidia-bookworm"
              else
                warn "DKMS build did not produce a loadable module — proceeding to patch phase"
                RESULT="dkms-failed"
              fi
            else
              warn "apt-get install of Bookworm package failed"
              RESULT="apt-failed"
            fi
          fi

          # ══════════════════════════════════════════════════════════════════
          # PHASE 3 — apply kernel 6.x compatibility patches and rebuild
          #
          # The Bookworm 390.157 DKMS source targets kernel 6.1.  Trixie ships
          # 6.12 which has several breaking API changes in the areas the driver
          # touches.  We apply targeted sed replacements for the known issues;
          # no external patch files are needed.
          #
          # Fixes applied:
          #  A) class_create(THIS_MODULE, name) → class_create(name)
          #     Kernel 6.4 removed the module argument.
          #  B) NV_GET_USER_PAGES no-task-struct variant — conftest.h guard
          #     Kernel 5.18+ changed get_user_pages signatures.
          #  C) drm_fb_helper_set_suspend_unlocked removal
          #     Removed in 6.3; stub it out so the translation unit compiles.
          #  D) pde_data() macro — PDE_DATA was renamed pde_data in 5.17
          #     The driver uses the old name; replace with the current one.
          #  E) nv_vm_flags_set/clear — vm_flags made const in 6.3
          #     Use vm_flags_set/vm_flags_clear helpers instead of direct write.
          # ══════════════════════════════════════════════════════════════════
          if [ "$RESULT" = "dkms-failed" ] || [ "$RESULT" = "apt-failed" ]; then
            log "Phase 3: applying kernel 6.x compatibility patches"

            # Locate the DKMS source tree
            DKMS_SRC=$(find /usr/src -maxdepth 1 -name "nvidia-legacy-390xx-*" -type d 2>/dev/null | sort -V | tail -1)

            if [ -z "$DKMS_SRC" ]; then
              warn "DKMS source directory not found — cannot patch"
              RESULT="patch-skipped"
            else
              ok "DKMS source tree: $DKMS_SRC"
              DKMS_MODULE=$(basename "$DKMS_SRC")   # e.g. nvidia-legacy-390xx-390.157

              # ── Fix A: class_create API (kernel 6.4+) ──────────────────
              log "  Patch A: class_create(THIS_MODULE, x) → class_create(x)"
              find "$DKMS_SRC" \( -name "*.c" -o -name "*.h" \) \
                -exec sed -i 's/class_create(THIS_MODULE, /class_create(/g' {} + 2>/dev/null || true

              # ── Fix B: get_user_pages / GUP flags (kernel 5.18+) ───────
              # The conftest for NV_GET_USER_PAGES_HAS_TASK_STRUCT fails on 6.x
              # Inject a define to tell the driver which variant to use
              log "  Patch B: GUP task_struct flag guard"
              CONFTEST="$DKMS_SRC/conftest.h"
              if [ -f "$CONFTEST" ] && ! grep -q 'NV_GET_USER_PAGES_HAS_TASK_STRUCT' "$CONFTEST"; then
                echo '#define NV_GET_USER_PAGES_HAS_TASK_STRUCT 0' >> "$CONFTEST"
              fi
              # Also patch nv-vm.c if it directly references the removed flag
              find "$DKMS_SRC" -name "nv-vm.c" \
                -exec sed -i 's/get_user_pages(current, current->mm,/get_user_pages(/g' {} + 2>/dev/null || true
              find "$DKMS_SRC" -name "nv-vm.c" \
                -exec sed -i 's/get_user_pages_remote(NULL, /get_user_pages_remote(/g' {} + 2>/dev/null || true

              # ── Fix C: drm_fb_helper_set_suspend_unlocked (removed 6.3) ─
              log "  Patch C: stub drm_fb_helper_set_suspend_unlocked"
              find "$DKMS_SRC" -name "*.c" \
                -exec sed -i 's/drm_fb_helper_set_suspend_unlocked([^)]*);/\/\* drm_fb_helper_set_suspend_unlocked removed in 6.3 \*\//g' {} + 2>/dev/null || true

              # ── Fix D: PDE_DATA → pde_data (kernel 5.17+) ─────────────
              log "  Patch D: PDE_DATA → pde_data"
              find "$DKMS_SRC" \( -name "*.c" -o -name "*.h" \) \
                -exec sed -i 's/\bPDE_DATA\b/pde_data/g' {} + 2>/dev/null || true

              # ── Fix E: vm_flags direct write → helpers (kernel 6.3+) ──
              # vm_area_struct.vm_flags became const; use vm_flags_set/clear
              log "  Patch E: vm_flags direct assignment → vm_flags_set/vm_flags_clear"
              # Replace: vma->vm_flags |= FOO  →  vm_flags_set(vma, FOO)
              find "$DKMS_SRC" -name "*.c" \
                -exec sed -i 's/\(vma->vm_flags\) |= \(.*\);/vm_flags_set(vma, \2);/g' {} + 2>/dev/null || true
              # Replace: vma->vm_flags &= ~FOO  →  vm_flags_clear(vma, FOO)
              find "$DKMS_SRC" -name "*.c" \
                -exec sed -i 's/\(vma->vm_flags\) \&= ~\(.*\);/vm_flags_clear(vma, \2);/g' {} + 2>/dev/null || true

              # ── Rebuild ────────────────────────────────────────────────
              log "  Rebuilding DKMS module: $DKMS_MODULE for kernel $KERNEL"
              if dkms build   -m "$DKMS_MODULE" -k "$KERNEL" 2>&1 && \
                 dkms install -m "$DKMS_MODULE" -k "$KERNEL" --force 2>&1; then
                if modinfo nvidia >/dev/null 2>&1; then
                  ok "Patched NVIDIA module built and installed"
                  RESULT="nvidia-patched"
                else
                  warn "dkms install succeeded but modinfo still fails"
                  RESULT="patch-modinfo-fail"
                fi
              else
                warn "Patched DKMS build failed — see /var/lib/dkms/${DKMS_MODULE}/${KERNEL}/build/make.log"
                RESULT="patch-build-fail"
              fi
            fi
          fi

          # ══════════════════════════════════════════════════════════════════
          # PHASE 4 — configure nouveau as reliable fallback
          #
          # nouveau fully supports the GTX 560 Ti (Fermi GF114) for desktop use:
          #   • Full 2D acceleration
          #   • OpenGL 4.5 via Mesa
          #   • All of KDE Plasma runs without issue
          # The "failed to create ce channel, -22" boot message is about the
          # GPU's copy engine used for compute workloads — NOT for display.
          # It appears at boot and is harmless for a desktop environment.
          # ══════════════════════════════════════════════════════════════════
          if [[ "$RESULT" != nvidia* ]]; then
            log "Phase 4: NVIDIA proprietary unavailable — configuring nouveau"

            # Purge whatever partial nvidia install happened
            DEBIAN_FRONTEND=noninteractive apt-get purge -y 'nvidia-legacy-390xx-*' 'nvidia-*' \
              2>/dev/null || true

            # Remove every blacklist that could have been left behind
            rm -f /etc/modprobe.d/nvidia*.conf
            rm -f /etc/modprobe.d/blacklist-nouveau.conf

            # Ensure nouveau loads with KMS (required for Wayland / KDE Plasma)
            cat > /etc/modprobe.d/nouveau-options.conf << 'NOUVEAUEOF'
          # Managed by devplatform.yml
          # modeset=1 is required for KDE Plasma 6 on Wayland.
          # The "ce channel -22" message at boot is non-fatal — it relates to
          # the Fermi copy-engine used for GPGPU, not for display output.
          options nouveau modeset=1
          NOUVEAUEOF

            # Install the explicit Xorg nouveau driver so the Xorg modesetting
            # fallback also works if Wayland does not start
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              xserver-xorg-video-nouveau libgl1-mesa-dri 2>/dev/null || true

            RESULT="nouveau"
            ok "Nouveau configured (modeset=1); display will work after reboot"
          fi

          # ══════════════════════════════════════════════════════════════════
          # ALWAYS — clean up temp repo and rebuild initramfs
          # ══════════════════════════════════════════════════════════════════
          log "Cleaning up Bookworm temporary repo"
          rm -f /etc/apt/sources.list.d/bookworm-nvidia.list
          rm -f /etc/apt/preferences.d/bookworm-nvidia-pin
          apt-get update -qq 2>/dev/null

          log "Rebuilding initramfs (all kernels)"
          update-initramfs -u -k all 2>&1

          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  GPU DRIVER RESULT : $RESULT"
          if [[ "$RESULT" == nvidia* ]]; then
          echo "║  Driver version    : $(modinfo nvidia 2>/dev/null | grep '^version' | awk '{print $2}')"
          echo "║  DKMS status       : $(dkms status 2>/dev/null | grep nvidia || echo 'see dkms status')"
          fi
          echo "║  Boot action       : sudo reboot"
          echo "╚══════════════════════════════════════════════════════════════╝"
        executable: /bin/bash
      register: _gpu_script
      changed_when: true
      failed_when: false
      when: has_nvidia and is_bare_metal

    - name: "[gpu/nvidia] Show driver installation log"
      ansible.builtin.debug:
        msg: "{{ _gpu_script.stdout_lines | default([]) }}"
      when: has_nvidia and is_bare_metal

    - name: "[gpu/nvidia] Fail if script itself crashed unexpectedly"
      ansible.builtin.fail:
        msg: >
          The GPU driver script exited with a non-zero return code (rc={{ _gpu_script.rc }}).
          stderr: {{ _gpu_script.stderr | default('(empty)') }}
          This is likely a missing dependency or an unreachable apt mirror.
      when:
        - has_nvidia and is_bare_metal
        - _gpu_script.rc is defined
        - _gpu_script.rc not in [0]

    # ── Branch D: AMD on bare metal ──────────────────────────────────────────
    - name: "[gpu/amd] Install AMD GPU firmware and Mesa driver stack"
      ansible.builtin.apt:
        name:
          - firmware-amd-graphics
          - xserver-xorg-video-amdgpu
          - libgl1-mesa-dri
          - mesa-vulkan-drivers
          - vulkan-tools
        state: present
      when: has_amd and is_bare_metal

    # ── Branch E: Intel integrated GPU on bare metal ─────────────────────────
    - name: "[gpu/intel] Install Intel GPU drivers and VA-API acceleration"
      ansible.builtin.apt:
        name:
          - intel-media-va-driver    # VA-API hardware video decode
          - libgl1-mesa-dri
          - mesa-vulkan-drivers
        state: present
      when: has_intel_gpu and is_bare_metal
      ignore_errors: true
      # NOTE: xserver-xorg-video-intel and i965-va-driver were removed from
      # Debian 13. Modern Intel GPUs use the modesetting Xorg driver (built in)
      # and iris Mesa driver automatically — no explicit package needed.
      # ignore_errors: true is here as a safety net, not because we expect failure.

    # ==========================================================================
    # HARDWARE FIRMWARE
    # ==========================================================================

    - name: "[FIRMWARE] Install wireless and general hardware firmware"
      ansible.builtin.apt:
        name:
          - firmware-linux           # generic Linux firmware bundle
          - firmware-linux-nonfree   # additional non-free firmware
          - firmware-iwlwifi         # Intel WiFi (AX200, AX210, 8260, 8265…)
          - firmware-realtek         # Realtek NICs and WiFi adapters
          - firmware-atheros         # Qualcomm/Atheros WiFi
          - firmware-brcm80211       # Broadcom WiFi (common in ThinkPads)
        state: present
      # Reason: A developer workstation may be on any hardware. Shipping all
      # common WiFi firmware ensures the system is usable on bare metal without
      # a separate post-install step. Unused firmware packages are harmless.

    # ==========================================================================
    # KDE PLASMA DESKTOP
    # ==========================================================================

    - name: "[KDE] Install KDE Plasma, SDDM, and core KDE applications"
      ansible.builtin.apt:
        name:
          - kde-standard                      # Plasma shell + Dolphin, Konsole, Kate, etc.
          - sddm                              # Simple Desktop Display Manager for KDE
          - plasma-nm                         # NetworkManager applet for KDE
          - konsole                           # KDE terminal emulator
          - fonts-firacode                    # developer font with ligatures
          - yakuake                           # drop-down terminal (F12 to toggle)
          - filelight                         # visual disk usage analyser
          - partitionmanager                  # KDE Partition Manager
          - ksshaskpass                       # graphical SSH key passphrase dialog
        state: present
        install_recommends: true

    - name: "[KDE] Register sddm as the default display manager via debconf"
      ansible.builtin.debconf:
        name: sddm
        question: shared/default-x-display-manager
        value: sddm
        vtype: select
      # Reason: If multiple DMs are installed as indirect dependencies (e.g.,
      # gdm3 pulled in by a GNOME library), this debconf selection ensures
      # sddm wins and is used at next boot.

    - name: "[KDE] Create /etc/sddm.conf.d/ directory"
      ansible.builtin.file:
        path: /etc/sddm.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[KDE] Write sddm configuration (Breeze theme, no auto-login)"
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/kde_settings.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by devplatform.yml
          [Theme]
          Current=breeze
          [Autologin]
          Relogin=false

    - name: "[KDE] Create sddm systemd drop-in directory"
      ansible.builtin.file:
        path: /etc/systemd/system/sddm.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[KDE] Write sddm udev-settle ordering drop-in"
      ansible.builtin.copy:
        dest: /etc/systemd/system/sddm.service.d/udev-wait.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by devplatform.yml
          [Unit]
          After=systemd-udev-settle.service

    - name: "[KDE] Enable sddm service"
      ansible.builtin.systemd:
        name: sddm
        enabled: true
        daemon_reload: true
      # Reason: We enable (not start) sddm here because the display server
      # cannot start inside an Ansible session. It starts after reboot.

    # ==========================================================================
    # GIT AND TOOLING
    # ==========================================================================

    - name: "[GIT] Download GitHub CLI GPG key"
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"
        force: false
      # Reason: force: false — the key is only downloaded if absent. Subsequent
      # runs skip the network request, making the task faster and idempotent.

    - name: "[GIT] Add GitHub CLI apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64
          signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
          https://cli.github.com/packages stable main
        state: present
        filename: github-cli
        update_cache: true

    - name: "[GIT] Install git and git tooling"
      ansible.builtin.apt:
        name:
          - git          # core VCS
          - git-lfs      # Large File Storage extension
          - git-delta    # syntax-highlighted, side-by-side diff pager
          - tig          # ncurses text-mode repository browser
          - gitk         # Tcl/Tk GUI history viewer
          - gh           # official GitHub CLI
          - meld         # visual diff and merge tool
        state: present
      # Reason: git-flow is intentionally excluded — this platform uses
      # trunk-based development. git-delta replaces the default diff output
      # with syntax-highlighted, side-by-side diffs.

    - name: "[GIT] Initialise git-lfs system-wide"
      ansible.builtin.command:
        cmd: git lfs install --system
      changed_when: false

    - name: "[GIT] Apply system-wide git configuration"
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          _changed=0
          _apply() {
            local _key="$1" _want="$2"
            local _have
            _have="$(git config --system --get "$_key" 2>/dev/null || true)"
            if [ "$_have" != "$_want" ]; then
              git config --system "$_key" "$_want"
              _changed=1
            fi
          }
          # ── Workflow ───────────────────────────────────────────────────────
          # 'input': CRLF → LF on commit; never adds CRLF. Correct for Linux
          # devs who occasionally handle Windows files.
          _apply core.autocrlf        input
          _apply init.defaultBranch   main
          # pull.rebase keeps trunk-based history linear.
          _apply pull.rebase          true
          # autoStash prevents "cannot rebase: unstaged changes" errors.
          _apply rebase.autoStash     true
          # ── Delta pager ────────────────────────────────────────────────────
          _apply core.pager           delta
          # navigate = true: n/N jump between diff sections.
          _apply delta.navigate       true
          _apply delta.side-by-side   true
          _apply delta.line-numbers   true
          # ── Diff/merge quality ─────────────────────────────────────────────
          # diff3 shows the common ancestor in conflict markers — makes
          # resolving conflicts significantly easier.
          _apply merge.conflictstyle  diff3
          _apply diff.colorMoved      default
          echo "$_changed"
        executable: /bin/bash
      register: _gitcfg
      changed_when: _gitcfg.stdout | trim == '1'
      # Reason: reads each key's current value before writing. The task
      # reports 'changed' only when at least one value was actually written,
      # so --diff runs are accurate and reruns are fully idempotent.

    - name: "[GIT] Check if lazygit is already installed"
      ansible.builtin.stat:
        path: /usr/local/bin/lazygit
      register: _lazygit_stat

    - name: "[GIT] Install lazygit — TUI git client"
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          VERSION=$(curl -sL "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" \
            | jq -r ".tag_name" | sed 's/v//')
          curl -sL \
            "https://github.com/jesseduffield/lazygit/releases/download/v${VERSION}/lazygit_${VERSION}_Linux_x86_64.tar.gz" \
            | tar -xzf - -C /usr/local/bin lazygit
          chmod +x /usr/local/bin/lazygit
        executable: /bin/bash
      when: not _lazygit_stat.stat.exists
      # Reason: lazygit is a full-featured TUI for git — stage hunks, resolve
      # conflicts, rebase interactively — all without leaving the terminal.
      # The stat check makes this idempotent. Delete the binary and re-run
      # the playbook to upgrade lazygit.

    # ==========================================================================
    # KVM VIRTUALISATION STACK
    # ==========================================================================

    - name: "[KVM] Install KVM virtualisation packages"
      ansible.builtin.apt:
        name:
          - qemu-kvm                 # KVM hypervisor and QEMU machine emulator
          - libvirt-daemon-system    # libvirtd system daemon
          - libvirt-clients          # virsh CLI and client libraries
          - virt-manager             # GTK GUI for managing VMs
          - virtinst                 # virt-install CLI for VM provisioning
          - virt-viewer              # lightweight SPICE/VNC VM console viewer
          - bridge-utils             # brctl for network bridging
          - ovmf                     # UEFI firmware for QEMU VMs
        state: present
      # Reason: ovmf (TianoCore UEFI) is required to install modern OSes
      # (Windows 11, Fedora with Secure Boot) inside KVM guests.

    - name: "[KVM] Add {{ real_user }} to libvirt group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: libvirt
        append: true
      # Reason: Without libvirt membership, the user gets "permission denied"
      # connecting to the libvirt socket. append: true is critical — omitting
      # it would remove the user from all other groups.

    - name: "[KVM] Add {{ real_user }} to kvm group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: kvm
        append: true
      # Reason: The kvm group grants r/w access to /dev/kvm. Without it,
      # hardware acceleration is unavailable and VMs run in pure software
      # emulation — extremely slow.

    - name: "[KVM] Enable and start libvirtd service"
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

    # ==========================================================================
    # FLATPAK WITH KDE DISCOVER
    # ==========================================================================

    - name: "[FLATPAK] Install Flatpak and KDE Discover Flatpak backend"
      ansible.builtin.apt:
        name:
          - flatpak
          - plasma-discover-backend-flatpak   # Flatpak integration in Discover
        state: present

    - name: "[FLATPAK] Add Flathub remote"
      ansible.builtin.command:
        cmd: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      # Reason: --if-not-exists is Flatpak's own idempotency guard.

    # ==========================================================================
    # BRAVE BROWSER
    # ==========================================================================

    - name: "[BRAVE] Download Brave Browser GPG key"
      ansible.builtin.get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"
        force: false

    - name: "[BRAVE] Add Brave Browser apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg]
          https://brave-browser-apt-release.s3.brave.com/ stable main
        state: present
        filename: brave-browser
        update_cache: true

    - name: "[BRAVE] Install Brave Browser"
      ansible.builtin.apt:
        name: brave-browser
        state: present

    # ==========================================================================
    # VISUAL STUDIO CODE
    # The VS Code post-install script can leave stale keyring entries at
    # multiple paths. We clean all known locations before adding ours to
    # ensure a reproducible state on both fresh installs and re-runs.
    # ==========================================================================

    # Recreation of signing key is intentional choice
    - name: "[VSCODE] Remove existing/conflicting Microsoft signing keys"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/share/keyrings/microsoft.gpg
        - /usr/share/keyrings/packages.microsoft.gpg
        - /etc/apt/keyrings/packages.microsoft.gpg
        - /etc/apt/keyrings/microsoft.gpg

    - name: "[VSCODE] Remove existing/conflicting VS Code apt source files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/vscode.list
        - /etc/apt/sources.list.d/vscode.sources
        - /etc/apt/sources.list.d/code.list
        - /etc/apt/sources.list.d/packages.microsoft.com_repos_code.list

    - name: "[VSCODE] Ensure required tools are installed"
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gpg
        state: present
        update_cache: true

    - name: "[VSCODE] Ensure /usr/share/keyrings exists"
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: "[VSCODE] Download Microsoft signing key"
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /tmp/microsoft.asc
        mode: "0644"
        force: true

    - name: "[VSCODE] Install Microsoft signing key"
      ansible.builtin.shell: |
        set -euo pipefail
        gpg --dearmor < /tmp/microsoft.asc > /usr/share/keyrings/microsoft.gpg
        chmod 0644 /usr/share/keyrings/microsoft.gpg
      args:
        executable: /bin/bash
      changed_when: false

    - name: "[VSCODE] Add Visual Studio Code repository"
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/vscode.list
        content: |
          deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main
        owner: root
        group: root
        mode: "0644"

    - name: "[VSCODE] Update apt cache after adding VS Code repository"
      ansible.builtin.apt:
        update_cache: true

    - name: "[VSCODE] Install Visual Studio Code"
      ansible.builtin.apt:
        name: code
        state: present

    # ==========================================================================
    # CURSOR IDE
    # Uses the official metadata API to resolve the current .deb URL rather
    # than following the multi-hop redirect from downloader.cursor.sh, which
    # Ansible's get_url does not handle correctly (downloads zero bytes).
    # ==========================================================================

    - name: "[cursor] Check whether Cursor binary already exists"
      ansible.builtin.stat:
        path: /usr/bin/cursor
      register: cursor_binary_stat

    - name: "[cursor] Ensure xz-utils is present"
      ansible.builtin.apt:
        name: xz-utils
        state: present
        update_cache: false
        lock_timeout: 300
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Fetch Cursor download metadata"
      ansible.builtin.uri:
        url: "{{ cursor_api_url }}"
        method: GET
        return_content: true
        status_code: 200
        timeout: 30
      register: cursor_api_response
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Parse Cursor metadata"
      ansible.builtin.set_fact:
        cursor_deb_url: "{{ (cursor_api_response.content | from_json).debUrl }}"
        cursor_expected_version: "{{ (cursor_api_response.content | from_json).version }}"
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Validate Cursor deb URL from API"
      ansible.builtin.assert:
        that:
          - cursor_deb_url is defined
          - cursor_deb_url is string
          - cursor_deb_url | length > 0
          - cursor_deb_url != "null"
          - cursor_deb_url is match('^https://')
        fail_msg: >-
          Cursor API did not return a valid debUrl.
          Raw response: {{ cursor_api_response.content | default('<no content>') }}
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Download Cursor Debian package"
      ansible.builtin.get_url:
        url: "{{ cursor_deb_url }}"
        dest: /tmp/cursor.deb
        mode: "0644"
        timeout: 300
        force: true
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Install Cursor IDE from downloaded .deb"
      ansible.builtin.apt:
        deb: /tmp/cursor.deb
        state: present
        force_apt_get: true
        lock_timeout: 300
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Remove downloaded package"
      ansible.builtin.file:
        path: /tmp/cursor.deb
        state: absent
      when: not cursor_binary_stat.stat.exists

    - name: "[cursor] Verify Cursor binary exists"
      ansible.builtin.stat:
        path: /usr/bin/cursor
      register: cursor_binary_verification

    - name: "[cursor] Fail if Cursor installation is incomplete"
      ansible.builtin.fail:
        msg: >-
          Cursor installation did not complete successfully.
          API version: {{ cursor_expected_version | default('unknown') }}
          Download URL: {{ cursor_deb_url | default('unknown') }}
          Binary exists: {{ cursor_binary_verification.stat.exists | default(false) }}
      when: not cursor_binary_verification.stat.exists

    - name: "[cursor] Report installed Cursor path"
      ansible.builtin.debug:
        msg: "✓ Cursor IDE installed at /usr/bin/cursor"

    # ==========================================================================
    # NERD FONTS
    # JetBrainsMono Nerd Font is required for starship prompt icons and eza
    # file-type icons in the terminal. Without it, the terminal shows squares
    # where icons should be.
    # A sentinel file is used as the idempotency guard because Nerd Fonts
    # changes archive filenames between releases — using a font filename as
    # the creates: guard breaks on version bumps.
    # ==========================================================================

    - name: "[fonts] Create Nerd Fonts directory"
      ansible.builtin.file:
        path: /usr/local/share/fonts/nerd-fonts
        state: directory
        mode: '0755'

    - name: "[fonts] Install JetBrainsMono Nerd Font"
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          VERSION=$(curl -sL "https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest" \
            | jq -r ".tag_name")
          curl -sL \
            "https://github.com/ryanoasis/nerd-fonts/releases/download/${VERSION}/JetBrainsMono.tar.xz" \
            | tar -xJf - -C /usr/local/share/fonts/nerd-fonts
          fc-cache -f
          touch /usr/local/share/fonts/nerd-fonts/.devplatform-installed
        creates: /usr/local/share/fonts/nerd-fonts/.devplatform-installed
        executable: /bin/bash
      # To upgrade: delete /usr/local/share/fonts/nerd-fonts/.devplatform-installed
      # and re-run the playbook.

    # ==========================================================================
    # NODE.JS VIA NVM
    # nvm is a shell function, not a binary — it must be installed per-user
    # into the real user's home directory. System-wide Node.js from NodeSource
    # apt would conflict with nvm's version management.
    # ==========================================================================

    - name: "[NVM] Check if nvm is already installed"
      ansible.builtin.stat:
        path: "{{ real_home }}/.nvm/nvm.sh"
      register: _nvm_stat

    - name: "[NVM] Install nvm {{ nvm_version }} for {{ real_user }}"
      ansible.builtin.shell:
        cmd: >
          curl -o-
          https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh
          | bash
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      when: not _nvm_stat.stat.exists
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"

    - name: "[NVM] Install latest Node.js LTS via nvm"
      ansible.builtin.shell: |
        export NVM_DIR="{{ real_home }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default node
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"
      register: _nvm_node_install
      changed_when: "'already installed' not in _nvm_node_install.stdout"
      # Reason: nvm.sh must be sourced because nvm is a shell function, not a
      # binary in PATH. nvm alias default node makes the LTS version active in
      # all new shell sessions without requiring 'nvm use' manually.

    - name: "[NVM] Install global npm packages"
      ansible.builtin.shell: |
        export NVM_DIR="{{ real_home }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        npm install -g pnpm yarn typescript ts-node nodemon http-server
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"
      changed_when: false

    # ==========================================================================
    # PYTHON AND TOOLING
    # ==========================================================================

    - name: "[PYTHON] Install Python system packages"
      ansible.builtin.apt:
        name:
          - python3        # Python 3 interpreter
          - python3-pip    # pip package installer
          - python3-venv   # venv module for virtual environments
          - python3-dev    # C header files for building Python extensions
          - pipx           # isolated application installer (PEP 668-safe)
        state: present
      # Reason: python3-dev is required to compile C extension modules
      # (cryptography, psycopg2, etc.). pipx installs CLI tools in isolated
      # virtualenvs, respecting PEP 668 which prevents pip from modifying
      # the system Python installation.

    - name: "[PYTHON] Ensure ~/.local/bin is on PATH in .zprofile"
      ansible.builtin.lineinfile:
        path: "{{ real_home }}/.zprofile"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
        create: true
        mode: "0644"
      become: true
      become_user: "{{ real_user }}"
      # Reason: zsh reads ~/.zprofile for login shells, not ~/.profile.
      # ~/.zshrc (interactive sessions) already sets this PATH.
      # ~/.zprofile covers login shells: bare tty, SSH, sddm session startup.

    - name: "[PYTHON] Ensure ~/.local/bin is on PATH in .profile (bash fallback)"
      ansible.builtin.lineinfile:
        path: "{{ real_home }}/.profile"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
        create: true
        mode: "0644"
      become: true
      become_user: "{{ real_user }}"

    - name: "[PYTHON] Install ansible-lint via pipx"
      ansible.builtin.command:
        cmd: pipx install ansible-lint
        creates: "{{ real_home }}/.local/pipx/venvs/ansible-lint"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"

    - name: "[PYTHON] Install pre-commit via pipx"
      ansible.builtin.command:
        cmd: pipx install pre-commit
        creates: "{{ real_home }}/.local/pipx/venvs/pre-commit"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"

    - name: "[PYTHON] Install cookiecutter via pipx"
      ansible.builtin.command:
        cmd: pipx install cookiecutter
        creates: "{{ real_home }}/.local/pipx/venvs/cookiecutter"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"

    - name: "[PYTHON] Check if uv is already installed"
      ansible.builtin.stat:
        path: "{{ real_home }}/.local/bin/uv"
      register: _uv_stat

    - name: "[PYTHON] Install uv (modern Python package manager)"
      ansible.builtin.shell:
        cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      when: not _uv_stat.stat.exists
      environment:
        HOME: "{{ real_home }}"
      # Reason: uv is not yet in Debian trixie. The official installer places
      # a static binary at ~/.local/bin/uv. The stat check makes this idempotent.

    # ==========================================================================
    # CORE DEVOPS UTILITIES
    # ==========================================================================

    - name: "[DEVOPS] Install core DevOps utility packages"
      ansible.builtin.apt:
        name:
          # ── File and data utilities ──────────────────────────────────────
          - curl
          - wget
          - jq             # JSON processor (the original, authoritative one)
          - unzip
          - zip
          - tar
          - rsync
          - p7zip-full     # 7z archive support
          - unrar          # RAR archive extraction
          # ── System monitoring ────────────────────────────────────────────
          - htop           # interactive process viewer
          - btop           # modern resource monitor with graphs
          - ncdu           # ncurses disk usage analyser
          - tree           # recursive directory listing
          # ── Modern CLI replacements ──────────────────────────────────────
          - fzf            # fuzzy finder — transforms terminal workflow
          - bat            # cat replacement with syntax highlighting
          - eza            # ls/tree replacement with icons and git status
          - ripgrep        # grep replacement — respects .gitignore, very fast
          - fd-find        # find replacement (saner syntax, faster)
          - starship       # cross-shell prompt with git and cloud context
          # ── Terminal multiplexer ─────────────────────────────────────────
          - tmux           # terminal multiplexer (screen is deliberately excluded)
          # ── Network utilities ────────────────────────────────────────────
          - net-tools      # ifconfig, netstat — legacy but useful for teaching
          - nmap           # network scanner
          - traceroute
          - dnsutils       # dig, nslookup, host
          - whois
          # ── SSH ──────────────────────────────────────────────────────────
          - openssh-client
          - openssh-server
          # ── Build tools ──────────────────────────────────────────────────
          - build-essential    # gcc, g++, make, libc-dev
          - cmake
          - pkg-config
          # ── Secret management (GitOps) ───────────────────────────────────
          - age                # modern file encryption (used with SOPS)
          # ── Ansible ──────────────────────────────────────────────────────
          - ansible
        state: present
      # Reason: starship is in Debian trixie repos — no external repo needed.
      # screen is excluded — tmux is the modern choice and teaching both
      # creates confusion with no benefit.
      # Note: yq is NOT installed from apt. The Debian 'yq' package is a Python
      # wrapper with different syntax from the mikefarah Go binary that all
      # documentation refers to. See the YQ section below.

    - name: "[DEVOPS] Create fd → fdfind symlink"
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: /usr/local/bin/fd
        state: link
      # Reason: Debian packages fd-find as 'fdfind' to avoid a conflict with
      # a legacy fdclone package. The entire world calls it 'fd'. This symlink
      # makes the standard name work without requiring shell aliases.

    # ==========================================================================
    # YQ — Go binary (mikefarah/yq)
    # The Debian 'yq' package is a Python wrapper around jq that uses jq syntax
    # — not yq syntax. Every tutorial and documentation page for 'yq' refers to
    # the Go-based mikefarah/yq. Installing the Debian package and then following
    # any external yq resource produces failures or wrong output.
    # ==========================================================================

    - name: "[YQ] Check if yq (Go) is already installed"
      ansible.builtin.stat:
        path: /usr/local/bin/yq
      register: _yq_stat

    - name: "[YQ] Install yq Go binary (mikefarah/yq)"
      ansible.builtin.get_url:
        url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        dest: /usr/local/bin/yq
        owner: root
        group: root
        mode: "0755"
        force: false
      when: not _yq_stat.stat.exists
      # To upgrade: delete /usr/local/bin/yq and re-run the playbook.

    # ==========================================================================
    # DOCKER CE (official Docker repository)
    # docker.io (the Debian-packaged Docker) is multiple major versions behind.
    # docker-compose v1 (standalone Python binary) was deprecated in 2023.
    # docker-compose-plugin is the current v2 implementation.
    # ==========================================================================

    - name: "[DOCKER] Download Docker GPG key"
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://download.docker.com/linux/debian/gpg
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: "[DOCKER] Set correct permissions on Docker GPG key"
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        owner: root
        group: root
        mode: "0644"

    - name: "[DOCKER] Add Docker CE apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/debian trixie stable
        state: present
        filename: docker-ce
        update_cache: true

    - name: "[DOCKER] Install Docker CE"
      ansible.builtin.apt:
        name:
          - docker-ce              # Docker Engine
          - docker-ce-cli          # Docker CLI
          - containerd.io          # Container runtime
          - docker-buildx-plugin   # BuildKit extended build capabilities
          - docker-compose-plugin  # 'docker compose' v2 (no hyphen)
        state: present

    - name: "[DOCKER] Add {{ real_user }} to docker group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: docker
        append: true
      # SECURITY NOTE: docker group = effective root on the host.
      # This is a deliberate convenience trade-off for a dev workstation.
      # append: true is mandatory to avoid removing other group memberships.

    - name: "[DOCKER] Enable and start Docker service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ==========================================================================
    # KUBECTL — official binary from dl.k8s.io
    # The pkgs.k8s.io apt signing key uses an OpenPGP v3 signature packet.
    # GnuPG 2.4+ (shipped in Debian 13) hard-rejects v3 packets since
    # 2026-02-01. The official binary install from dl.k8s.io sidesteps this
    # entirely and is the documented standalone method.
    # ==========================================================================

    - name: "[KUBECTL] Check if kubectl is already installed"
      ansible.builtin.stat:
        path: /usr/local/bin/kubectl
      register: _kubectl_stat

    - name: "[KUBECTL] Install kubectl — official binary"
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
          curl -sLO "https://dl.k8s.io/release/${VERSION}/bin/linux/amd64/kubectl"
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          rm -f kubectl
        executable: /bin/bash
      when: not _kubectl_stat.stat.exists
      # To upgrade: delete /usr/local/bin/kubectl and re-run the playbook.

    # ==========================================================================
    # HELM — pinned version with SHA256 checksum verification
    # ==========================================================================

    - name: "[HELM] Check installed Helm version"
      ansible.builtin.command:
        cmd: /usr/local/bin/helm version --short
      register: _helm_installed
      changed_when: false
      failed_when: false
      # Reason: helm version --short outputs e.g. "v3.16.3+gabcdef0".
      # We check whether helm_version (e.g. "v3.16.3") appears in that string.
      # failed_when: false — command missing entirely is a valid "not installed"
      # state, not an error. stdout will be empty in that case.

    - name: "[HELM] Download Helm archive"
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        dest: "/tmp/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        mode: "0644"
      when: helm_version not in (_helm_installed.stdout | default(''))

    - name: "[HELM] Download Helm checksum"
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz.sha256sum"
        dest: "/tmp/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz.sha256sum"
        mode: "0644"
      when: helm_version not in (_helm_installed.stdout | default(''))

    - name: "[HELM] Verify Helm checksum"
      ansible.builtin.shell: |
        set -euo pipefail
        cd /tmp
        sha256sum -c "helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz.sha256sum"
      args:
        executable: /bin/bash
      changed_when: false
      when: helm_version not in (_helm_installed.stdout | default(''))
      # Reason: checksum verification ensures the downloaded archive has not
      # been tampered with or corrupted in transit.

    - name: "[HELM] Extract Helm archive"
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        dest: /tmp
        remote_src: true
      when: helm_version not in (_helm_installed.stdout | default(''))

    - name: "[HELM] Install Helm binary"
      ansible.builtin.copy:
        src: "/tmp/linux-{{ helm_arch }}/helm"
        dest: /usr/local/bin/helm
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      when: helm_version not in (_helm_installed.stdout | default(''))

    - name: "[HELM] Verify Helm installed"
      ansible.builtin.command: /usr/local/bin/helm version --short
      changed_when: false
      # Always runs — confirms the binary works regardless of whether this
      # run installed it or it was already present from a previous run.

    # ==========================================================================
    # K9S — terminal UI for Kubernetes
    # ==========================================================================

    - name: "[K9S] Check if k9s is already installed"
      ansible.builtin.stat:
        path: /usr/local/bin/k9s
      register: _k9s_stat

    - name: "[K9S] Download k9s tarball"
      ansible.builtin.get_url:
        url: https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_amd64.tar.gz
        dest: /tmp/k9s.tar.gz
        mode: "0644"
      when: not _k9s_stat.stat.exists

    - name: "[K9S] Extract k9s binary to /usr/local/bin"
      ansible.builtin.unarchive:
        src: /tmp/k9s.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        extra_opts:
          - k9s     # extract only the k9s binary, skip LICENSE and README
      when: not _k9s_stat.stat.exists

    - name: "[K9S] Ensure k9s binary is executable"
      ansible.builtin.file:
        path: /usr/local/bin/k9s
        mode: "0755"
      when: not _k9s_stat.stat.exists

    # ==========================================================================
    # COSIGN — container image signing (sigstore)
    # Required for image signing in Module 3 and supply-chain security in
    # Module 6 (GitOps). Installing now avoids a mid-module setup interruption.
    # ==========================================================================

    - name: "[COSIGN] Check if cosign is already installed"
      ansible.builtin.stat:
        path: /usr/local/bin/cosign
      register: _cosign_stat

    - name: "[COSIGN] Install cosign binary"
      ansible.builtin.get_url:
        url: https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
        dest: /usr/local/bin/cosign
        owner: root
        group: root
        mode: "0755"
        force: false
      when: not _cosign_stat.stat.exists

    # ==========================================================================
    # SHELL AND TERMINAL SETUP
    # Shell: zsh with starship prompt.
    # Starship is cross-shell, actively maintained, and requires zero theme
    # configuration. It reads git, cloud, and tool context automatically.
    # oh-my-zsh is intentionally not used — it adds framework overhead and
    # requires separate theme/font configuration to look correct.
    # ==========================================================================

    - name: "[SHELL] Install zsh"
      ansible.builtin.apt:
        name: zsh
        state: present

    - name: "[SHELL] Set zsh as default login shell for {{ real_user }}"
      ansible.builtin.user:
        name: "{{ real_user }}"
        shell: /bin/zsh
      # Reason: ansible.builtin.user writes directly to /etc/passwd, which is
      # idempotent and does not prompt for a password (unlike chsh).

    - name: "[SHELL] Add nvm init block to .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — nvm"
        block: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: nvm's install script appends init lines to ~/.bashrc but not
      # ~/.zshrc. Without this block, nvm and node are unavailable in zsh.

    - name: "[SHELL] Add ~/.local/bin to PATH in .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — local bin PATH"
        block: |
          export PATH="$HOME/.local/bin:$PATH"
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: pipx, uv, pre-commit, cookiecutter, and ansible-lint all
      # install to ~/.local/bin.

    - name: "[SHELL] Initialise starship prompt in .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — starship"
        block: |
          eval "$(starship init zsh)"
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: starship init zsh installs the prompt hook. It reads
      # ~/.config/starship.toml for configuration; without that file it uses
      # a sensible default that shows git branch, language versions, and
      # cloud context automatically.

    - name: "[SHELL] Source fzf key bindings and completions in .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — fzf"
        block: |
          source /usr/share/doc/fzf/examples/key-bindings.zsh 2>/dev/null || true
          source /usr/share/doc/fzf/examples/completion.zsh   2>/dev/null || true
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: Without oh-my-zsh's fzf plugin, we source the key binding
      # examples directly from the installed fzf package. This binds:
      #   Ctrl-R  → fuzzy history search
      #   Ctrl-T  → fuzzy file picker, inserts path at cursor
      #   Alt-C   → fuzzy cd into a subdirectory

    - name: "[SHELL] Add shell aliases for modern CLI tools"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — aliases"
        block: |
          # ── Modern CLI replacements ────────────────────────────────────────
          alias cat='bat --paging=never'      # syntax-highlighted cat
          alias ls='eza --icons'              # ls with icons and git status
          alias ll='eza -la --icons --git'    # long listing with git status
          alias tree='eza --tree --icons'     # directory tree with icons
          alias grep='rg'                     # ripgrep as default grep
          alias find='fd'                     # fd as default find

          # ── Git shortcuts ──────────────────────────────────────────────────
          alias gs='git status'
          alias gc='git commit'
          alias gp='git push'
          alias gl='git log --oneline --graph --decorate --all'
          alias lg='lazygit'

          # ── Kubernetes shortcuts ───────────────────────────────────────────
          alias k='kubectl'
          alias kgp='kubectl get pods'
          alias kgs='kubectl get services'
          alias kgn='kubectl get nodes'
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"



    # ==========================================================================
    # SYSTEM CLEANUP AND SUMMARY
    # ==========================================================================

    - name: "[FINAL] Remove temporary files created during bootstrap"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/microsoft.asc
        - /tmp/k9s.tar.gz
        - /tmp/cursor.deb
        - "/tmp/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        - "/tmp/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz.sha256sum"
        - "/tmp/linux-{{ helm_arch }}"

    - name: "[FINAL] Print post-install instructions"
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════"
          - " ✔  Developer Platform Bootstrap — COMPLETE"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "  REQUIRED STEPS:"
          - ""
          - "  1. Reboot:"
          - "       sudo reboot"
          - "     Required for: GPU drivers, kernel modules, sddm,"
          - "     nouveau blacklist, and all group memberships."
          - ""
          - "  2. After reboot, KDE Plasma starts via sddm."
